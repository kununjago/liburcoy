<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libur Semester 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pure-white: #FFFFFF;
            --pure-black: #000000;
            --dark-gray: #1a1a1a;
            --mid-gray: #555555;
            --light-gray: #cccccc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, var(--mid-gray) 0%, var(--pure-black) 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--pure-white);
            overflow: hidden;
        }

        /* --- LOADING SCREEN STYLES --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--mid-gray) 0%, var(--pure-black) 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .nuro-logo {
            font-size: 3rem; /* Sedikit disesuaikan agar teks panjang tidak tumpah */
            font-weight: 900;
            color: var(--pure-white);
            letter-spacing: 5px;
            margin: 0;
            text-align: center;
            animation: pulse-glow 1.5s infinite alternate;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .loading-text {
            color: var(--light-gray);
            margin-top: 15px;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.95); text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
            100% { transform: scale(1.05); text-shadow: 0 0 40px rgba(255, 255, 255, 0.9); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- MAIN CARD STYLES --- */
        .card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            max-width: 550px;
            width: 90%;
            position: relative;
            
            /* Animasi masuk untuk card */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: opacity 1s ease, transform 1s ease;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--pure-white);
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .time-box {
            background: var(--pure-white);
            color: var(--pure-black);
            padding: 15px;
            border-radius: 15px;
            min-width: 70px;
            box-shadow: 0 8px 0 var(--light-gray);
        }

        .time-box span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
        }

        .message {
            font-style: italic;
            opacity: 0.9;
            margin-top: 1rem;
            color: var(--light-gray);
        }

        .btn-celebrate {
            margin-top: 20px;
            background: var(--pure-white);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: var(--pure-black);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .btn-celebrate:hover { 
            transform: scale(1.1); 
            background: var(--light-gray);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.4);
        }

        .decoration { 
            font-size: 2.5rem; 
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="loader">
    <h1 class="nuro-logo">KENAN GANTENG</h1>
    <div class="loading-text">Memuat Waktu...</div>
</div>

<div class="card" id="mainCard">
    <div class="decoration">🎓 🎒 🎮</div>
    <h1>Liburan Semester</h1>
    <p>Menuju 18 Juni 2026</p>

    <div class="countdown-container">
        <div class="time-box">
            <span id="days">00</span>
            <div class="label">Hari</div>
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            <div class="label">Jam</div>
        </div>
        <div class="time-box">
            <span id="mins">00</span>
            <div class="label">Menit</div>
        </div>
        <div class="time-box">
            <span id="secs">00</span>
            <div class="label">Detik</div>
        </div>
    </div>

    <p class="message" id="quote">"Waktunya istirahat, rebahan, dan lupakan tugas sejenak!"</p>
    <button class="btn-celebrate" onclick="launchConfetti()">Klik Semangat!</button>
</div>

<script>
    // FUNGSI LOADING & MUNCULKAN CARD
    window.addEventListener('load', function() {
        // Simulasi waktu loading selama 2.5 detik
        setTimeout(function() {
            // Sembunyikan loader
            document.getElementById('loader').classList.add('hidden');
            
            // Munculkan card dengan efek mulus
            document.getElementById('mainCard').classList.add('show');
            
            // Nyalakan petasan kertas setengah detik setelah card muncul
            setTimeout(launchConfetti, 500);
        }, 2500); 
    });

    // FUNGSI COUNTDOWN REAL-TIME
    function updateCountdown() {
        // SET TANGGAL KE 18 JUNI 2026
        const targetDate = new Date('June 18, 2026 00:00:00').getTime();
        const now = new Date().getTime();
        const diff = targetDate - now;

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('days').innerText = d < 10 ? '0'+d : d;
        document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
        document.getElementById('mins').innerText = m < 10 ? '0'+m : m;
        document.getElementById('secs').innerText = s < 10 ? '0'+s : s;

        // JIKA WAKTU HABIS
        if (diff < 0) {
            clearInterval(timer);
            document.getElementById("mainCard").innerHTML = "<h1>SELAMAT LIBURAN!</h1><p>Waktunya Liburan Semester, mari bersantai!</p>";
        }
    }

    // FUNGSI KONFETI (DIUBAH KE WARNA MONOKROM/GREYSCALE)
    function launchConfetti() {
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#000000', '#FFFFFF', '#555555', '#CCCCCC']
        });
    }

    // Jalankan timer
    const timer = setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
